<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Roboto', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .form-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .form-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .form-body {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        
        .required {
            color: #e74c3c;
        }
        
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .checkbox-item label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
            user-select: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }
        
        .btn-reset {
            background: #ecf0f1;
            color: #333;
            border: 1px solid #bdc3c7;
        }
        
        .btn-reset:hover {
            background: #d5dbdb;
        }
        
        .output-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 4px;
            display: none;
        }
        
        .output-section.show {
            display: block;
        }
        
        .output-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }
        
        #jsonOutput {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
        }
        
        .btn-copy {
            margin-top: 10px;
            background: #27ae60;
            color: white;
            padding: 10px 15px;
            font-size: 14px;
        }
        
        .btn-copy:hover {
            background: #229954;
        }
        
        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-header">
            <h1>Student Information</h1>
            <p>Please fill in your details below</p>
        </div>
        
        <div class="form-body">
            <form id="studentForm">
                <div class="form-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="dob">Date of Birth <span class="required">*</span></label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                
                <div class="form-group">
                    <label for="branch">Branch <span class="required">*</span></label>
                    <select id="branch" name="branch" required>
                        <option value="">-- Select Branch --</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Information Technology">Information Technology</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Skills <span class="required">*</span></label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="skill1" name="skills" value="JavaScript">
                            <label for="skill1">JavaScript</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="skill2" name="skills" value="Python">
                            <label for="skill2">Python</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="skill3" name="skills" value="Java">
                            <label for="skill3">Java</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="skill4" name="skills" value="HTML/CSS">
                            <label for="skill4">HTML/CSS</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="skill5" name="skills" value="React">
                            <label for="skill5">React</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="skill6" name="skills" value="SQL">
                            <label for="skill6">SQL</label>
                        </div>
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-submit">Submit</button>
                    <button type="reset" class="btn-reset">Clear</button>
                </div>
            </form>
            
            <div class="output-section" id="outputSection">
                <h3>Form Data (JSON Format):</h3>
                <pre id="jsonOutput"></pre>
                <button class="btn-copy" onclick="copyToClipboard()">Copy JSON</button>
                <div class="success-message" id="successMessage">Copied to clipboard!</div>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('studentForm');
        const outputSection = document.getElementById('outputSection');
        const jsonOutput = document.getElementById('jsonOutput');
        const successMessage = document.getElementById('successMessage');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            const branch = document.getElementById('branch').value;
            
            // Get selected skills
            const skillCheckboxes = document.querySelectorAll('input[name="skills"]:checked');
            const skills = Array.from(skillCheckboxes).map(checkbox => checkbox.value);
            
            // Create JSON object
            const formData = {
                name: name,
                dateOfBirth: dob,
                branch: branch,
                skills: skills
            };
            
            // Display JSON
            jsonOutput.textContent = JSON.stringify(formData, null, 2);
            outputSection.classList.add('show');
            
            // Scroll to output
            setTimeout(() => {
                outputSection.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        });
        
        function copyToClipboard() {
            const jsonText = jsonOutput.textContent;
            navigator.clipboard.writeText(jsonText).then(() => {
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
